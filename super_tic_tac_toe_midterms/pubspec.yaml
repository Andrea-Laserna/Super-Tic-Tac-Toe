name: super_tic_tac_toe_midterms
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/galaxy.png
    - assets/grid.png
  fonts:
    - family: Daydream
      fonts:
        - asset: fonts/Daydream.otf
    - family: Pixellari
      fonts:
        - asset: fonts/Pixellari.ttf
    - family: Brady
      fonts:
        - asset: fonts/BRADY.TTF
